name: Sync Data & Static Files

# Syncs everything for BOTH portfolios in a single run:
# 1. Fetches data from Airtable ONCE for both directing & postproduction (5 API calls)
# 2. Syncs new images to Cloudinary (cache-first, only uploads genuinely new images)
# 3. Generates static files (portfolio-data.json, sitemap.xml, robots.txt) per domain
# 4. Commits changes to the main branch → jsDelivr CDN auto-updates

on:
  repository_dispatch:
    types: [airtable-webhook-sync]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for sync (optional)'
        required: false
        default: 'Manual content sync'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync all portfolio data & images
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN || secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          USE_CLOUDINARY: 'true'
        run: |
          echo "🔄 Syncing all portfolio data (single Airtable fetch)..."
          npm run sync:all
          echo "✅ All portfolio data synced!"

      - name: Sync Instagram Studio (optional)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN || secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "📸 Attempting Instagram Studio sync..."
          if [ -f "scripts/upload-instagram-data.mjs" ]; then
            node scripts/upload-instagram-data.mjs || echo "Skipping Instagram Studio Upload"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected"
          fi

      - name: Deploy Data to 'data' branch
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          # Use a temporary directory to build the data-only branch content
          mkdir -p ../temp-data
          
          # Copy only the files we want to persist in the 'data' branch
          cp -r directing ../temp-data/
          cp -r postproduction ../temp-data/
          cp cloudinary-mapping.json ../temp-data/
          
          # Switch to the data branch (creating it if it doesn't exist)
          git checkout --orphan data
          git rm -rf .
          
          # Move files back from temp
          mv ../temp-data/* .
          
          # Configure identity
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          
          # Add and commit
          git add -A
          git commit -m "chore: full data & static sync [ci skip]
          
          Reason: ${{ github.event.inputs.reason || 'Automated Sync' }}
          Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Force push to the data branch
          git push -f origin data
          echo "✅ Data pushed to 'data' branch and available via jsDelivr @data!"
