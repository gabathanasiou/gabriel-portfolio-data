name: Sync Data & Static Files

# Syncs everything for BOTH portfolios in a single run:
# 1. Downloads the existing Cloudinary mapping from the 'data' branch (warm cache)
# 2. Fetches data from Airtable ONCE for both directing & postproduction (5 API calls)
# 3. Syncs new images to Cloudinary (cache-first, only uploads genuinely new images)
# 4. Generates static files (portfolio-data.json, sitemap.xml, robots.txt) per domain
# 5. Pushes artifacts to the dedicated 'data' branch → jsDelivr CDN auto-updates

on:
  repository_dispatch:
    types: [airtable-webhook-sync]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for sync (optional)'
        required: false
        default: 'Manual content sync'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Restore Cloudinary mapping cache
        run: |
          echo "📦 Downloading existing Cloudinary mapping from data branch..."
          curl -sL "https://cdn.jsdelivr.net/gh/gabathanasiou/gabriel-portfolio-data@data/cloudinary-mapping.json" \
            -o cloudinary-mapping.json 2>/dev/null || echo "{}" > cloudinary-mapping.json
          if [ -s cloudinary-mapping.json ] && python3 -c "import json; json.load(open('cloudinary-mapping.json'))" 2>/dev/null; then
            echo "✅ Loaded existing mapping ($(wc -c < cloudinary-mapping.json | tr -d ' ') bytes)"
          else
            echo "ℹ️ No existing mapping found, starting fresh"
            echo '{"generatedAt":"","projects":[],"journal":[],"config":{"images":[]}}' > cloudinary-mapping.json
          fi

      - name: Sync all portfolio data & images
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN || secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          USE_CLOUDINARY: 'true'
        run: |
          echo "🔄 Syncing all portfolio data (single Airtable fetch)..."
          npm run sync:all
          echo "✅ All portfolio data synced!"

      - name: Sync Instagram Studio (optional)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN || secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          echo "📸 Attempting Instagram Studio sync..."
          if [ -f "scripts/instagram-studio-data-backup.json" ] && [ -f "scripts/upload-instagram-data.mjs" ]; then
            node scripts/upload-instagram-data.mjs
          else
            echo "ℹ️ Skipping Instagram Studio Upload: Backup file or script missing."
          fi

      - name: Check for changes
        id: check_changes
        run: |
          # Check if the generated files exist and have content
          if [ -d "directing" ] || [ -d "postproduction" ] || [ -f "cloudinary-mapping.json" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Data generated"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No data detected"
          fi

      - name: Deploy Data to 'data' branch
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          # 1. Prepare artifact stage
          mkdir -p ../stage
          [ -d "directing" ] && cp -r directing ../stage/
          [ -d "postproduction" ] && cp -r postproduction ../stage/
          [ -f "cloudinary-mapping.json" ] && cp cloudinary-mapping.json ../stage/
          
          # 2. Switch to a fresh orphan branch
          git checkout --orphan data-branch
          git rm -rf .
          
          # 3. Copy artifacts back
          cp -r ../stage/* .
          
          # 4. Explicitly add only what we want
          git add -f directing/ postproduction/ cloudinary-mapping.json
          
          # 5. Commit and push
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git commit -m "chore: full data & static sync [ci skip] (clean)"
          git push -f origin data-branch:data
          echo "✅ Data branch updated successfully (Artifacts only)"

      - name: Purge jsDelivr Cache
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "🧹 Purging jsDelivr cache..."
          curl -s "https://purge.jsdelivr.net/gh/$GITHUB_REPOSITORY@data/directing/portfolio-data.json"
          curl -s "https://purge.jsdelivr.net/gh/$GITHUB_REPOSITORY@data/postproduction/portfolio-data.json"
          echo "✅ Cache purged"
